<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>질문하기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f8;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #111118;
  --text-muted: #777788;
  --text-faint: #c0c0cc;
  --accent: #4361ee;
  --accent-light: #eef0ff;
  --success: #38a169;
  --success-light: #f0fff4;
  --font-kr: 'Noto Sans KR', sans-serif;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-kr);
  -webkit-font-smoothing: antialiased;
}

#app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 3rem;
}

/* ── 헤더 ── */
header {
  width: 100%;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1.25rem 1.5rem;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--accent-light);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 99px;
  margin-bottom: 6px;
}
.live-dot-sm {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}
header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.4px;
  color: var(--text);
}

/* ── 메인 ── */
main {
  width: 100%;
  max-width: 480px;
  padding: 1.5rem 1.25rem 0;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* ── 질문 입력 카드 ── */
.input-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  box-shadow: 0 2px 16px rgba(0,0,0,0.05);
}
.input-card textarea {
  width: 100%;
  min-height: 110px;
  resize: none;
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 16px;
  font-family: var(--font-kr);
  color: var(--text);
  background: var(--bg);
  outline: none;
  line-height: 1.6;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}
.input-card textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(67,97,238,0.12);
  background: #fff;
}
.input-card textarea::placeholder { color: var(--text-faint); }

.char-count {
  text-align: right;
  font-size: 12px;
  color: var(--text-faint);
  margin-top: -6px;
}
.char-count.warn { color: #e53e3e; }

.btn-submit {
  width: 100%;
  padding: 15px;
  background: var(--accent);
  color: #fff;
  font-family: var(--font-kr);
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  letter-spacing: -0.2px;
  transition: opacity 0.15s, transform 0.1s;
  box-shadow: 0 4px 20px rgba(67,97,238,0.28);
}
.btn-submit:hover { opacity: 0.9; }
.btn-submit:active { transform: scale(0.98); }
.btn-submit:disabled {
  background: var(--text-faint);
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}

/* ── 완료 메시지 ── */
#successMsg {
  display: none;
  background: var(--success-light);
  border: 1px solid rgba(56,161,105,0.25);
  border-radius: 14px;
  padding: 1rem 1.25rem;
  display: none;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 500;
  color: var(--success);
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── 이모지 섹션 ── */
.emoji-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 1.25rem;
  box-shadow: 0 2px 16px rgba(0,0,0,0.05);
}
.emoji-card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 1rem;
  letter-spacing: -0.1px;
}
.emoji-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.emoji-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 12px 6px;
  background: var(--bg);
  border: 1.5px solid transparent;
  border-radius: 14px;
  cursor: pointer;
  font-size: 28px;
  line-height: 1;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.emoji-btn:hover { background: var(--accent-light); }
.emoji-btn:active { transform: scale(0.88); }
.emoji-btn.tapped {
  background: var(--accent-light);
  border-color: rgba(67,97,238,0.3);
}
.emoji-btn .e-count {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  font-family: var(--font-kr);
}

/* ── 내 질문 목록 ── */
.my-qs-section {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.section-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.my-q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1rem 1.25rem;
  font-size: 15px;
  line-height: 1.55;
  color: var(--text);
  animation: fadeIn 0.3s ease;
}
.my-q-time {
  font-size: 11px;
  color: var(--text-faint);
  margin-top: 6px;
}

/* ── Firebase 설정 오버레이 ── */
#configOverlay {
  position: fixed;
  inset: 0;
  background: rgba(245,245,248,0.97);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
}
.config-box {
  width: 100%;
  max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2rem;
  display: flex;
  flex-direction: column;
  gap: 1.1rem;
  box-shadow: 0 8px 40px rgba(0,0,0,0.1);
}
.config-box h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}
.config-box p {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.7;
}
.config-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.config-box input {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 11px 13px;
  font-size: 13px;
  font-family: monospace;
  color: var(--accent);
  outline: none;
  width: 100%;
  transition: border-color 0.2s;
}
.config-box input:focus { border-color: var(--accent); }
.config-box input::placeholder { color: var(--text-faint); font-family: var(--font-kr); }
.btn-connect {
  padding: 13px;
  background: var(--accent);
  color: #fff;
  font-family: var(--font-kr);
  font-size: 15px;
  font-weight: 700;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- Firebase 설정 오버레이 -->
<div id="configOverlay">
  <div class="config-box">
    <h2>🔧 Firebase 연결</h2>
    <p>발표자에게 받은 설정값을 입력하세요.<br>(이 화면은 발표자만 초기 설정 시 사용합니다)</p>
    <div>
      <div class="config-label">API Key</div>
      <input type="text" id="cfg-apiKey" placeholder="AIzaSy..." />
    </div>
    <div>
      <div class="config-label">Project ID</div>
      <input type="text" id="cfg-projectId" placeholder="my-seminar-app" />
    </div>
    <div>
      <div class="config-label">Database URL</div>
      <input type="text" id="cfg-dbUrl" placeholder="https://...firebaseio.com" />
    </div>
    <button class="btn-connect" onclick="connectFirebase()">연결하기</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-badge">
      <div class="live-dot-sm"></div>
      Live Q&A
    </div>
    <h1>질문을 남겨주세요</h1>
  </header>

  <main>
    <!-- 질문 입력 -->
    <div class="input-card">
      <textarea id="qText" placeholder="궁금한 점을 자유롭게 입력해주세요" maxlength="200" oninput="onInput()"></textarea>
      <div class="char-count" id="charCount">0 / 200</div>
      <button class="btn-submit" id="submitBtn" onclick="submitQ()" disabled>질문 보내기</button>
    </div>

    <!-- 완료 메시지 -->
    <div id="successMsg">
      <span>✅</span>
      <span>질문이 전송되었습니다!</span>
    </div>

    <!-- 이모지 반응 -->
    <div class="emoji-card">
      <div class="emoji-card-title">반응 남기기</div>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>

    <!-- 내 질문 -->
    <div class="my-qs-section" id="myQsSection" style="display:none">
      <div class="section-label">내가 보낸 질문</div>
      <div id="myQsList"></div>
    </div>
  </main>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, push, update, get, child }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  const EMOJIS = ['👍','👏','🔥','❤️','😮'];
  let db = null;
  let lastQKey = null;
  const emojiCounts = {};
  EMOJIS.forEach(e => emojiCounts[e] = 0);

  // 저장된 config 불러오기
  const saved = localStorage.getItem('fb_config');
  if (saved) {
    try {
      const c = JSON.parse(saved);
      document.getElementById('cfg-apiKey').value = c.apiKey || '';
      document.getElementById('cfg-projectId').value = c.projectId || '';
      document.getElementById('cfg-dbUrl').value = c.databaseURL || '';
    } catch(e) {}
  }

  window.connectFirebase = function() {
    const apiKey = document.getElementById('cfg-apiKey').value.trim();
    const projectId = document.getElementById('cfg-projectId').value.trim();
    const databaseURL = document.getElementById('cfg-dbUrl').value.trim();
    if (!apiKey || !projectId || !databaseURL) { alert('모든 항목을 입력해주세요.'); return; }

    const config = { apiKey, projectId, databaseURL,
      authDomain: `${projectId}.firebaseapp.com`,
      storageBucket: `${projectId}.appspot.com`,
      messagingSenderId: '000000000000',
      appId: '1:000000000000:web:000000000000000000000000'
    };
    localStorage.setItem('fb_config', JSON.stringify({ apiKey, projectId, databaseURL }));
    try {
      const app = initializeApp(config);
      db = getDatabase(app);
      document.getElementById('configOverlay').style.display = 'none';
      buildEmojiGrid();
    } catch(e) { alert('연결 실패: ' + e.message); }
  };

  window.onInput = function() {
    const val = document.getElementById('qText').value;
    const len = val.length;
    const cc = document.getElementById('charCount');
    cc.textContent = `${len} / 200`;
    cc.className = 'char-count' + (len > 180 ? ' warn' : '');
    document.getElementById('submitBtn').disabled = len === 0;
  };

  window.submitQ = async function() {
    if (!db) return;
    const text = document.getElementById('qText').value.trim();
    if (!text) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '전송 중...';

    try {
      const qRef = ref(db, 'questions');
      const snap = await push(qRef, {
        text,
        createdAt: Date.now(),
        reactions: Object.fromEntries(EMOJIS.map(e => [e, 0]))
      });
      lastQKey = snap.key;

      document.getElementById('qText').value = '';
      document.getElementById('charCount').textContent = '0 / 200';
      btn.textContent = '질문 보내기';

      const sm = document.getElementById('successMsg');
      sm.style.display = 'flex';
      setTimeout(() => { sm.style.display = 'none'; }, 3000);

      addMyQ(text);
    } catch(e) {
      alert('전송 실패: ' + e.message);
      btn.disabled = false;
      btn.textContent = '질문 보내기';
    }
  };

  function buildEmojiGrid() {
    const grid = document.getElementById('emojiGrid');
    EMOJIS.forEach(e => {
      const btn = document.createElement('button');
      btn.className = 'emoji-btn';
      btn.id = 'ebtn-' + e;
      btn.innerHTML = `<span>${e}</span><span class="e-count" id="ecnt-${e}">0</span>`;
      btn.onclick = () => sendReaction(e, btn);
      grid.appendChild(btn);
    });
  }

  async function sendReaction(emoji, btn) {
    if (!db || !lastQKey) {
      // 질문 없이 반응만 보낼 경우 최신 질문에 반응
      const snap = await get(ref(db, 'questions'));
      if (!snap.exists()) return;
      const keys = Object.keys(snap.val());
      lastQKey = keys[keys.length - 1];
    }

    btn.classList.add('tapped');
    setTimeout(() => btn.classList.remove('tapped'), 300);

    emojiCounts[emoji]++;
    document.getElementById('ecnt-' + emoji).textContent = emojiCounts[emoji];

    const updates = {};
    updates[`questions/${lastQKey}/reactions/${emoji}`] = emojiCounts[emoji];
    try {
      await update(ref(db), updates);
    } catch(e) { console.error(e); }
  }

  function addMyQ(text) {
    const section = document.getElementById('myQsSection');
    const list = document.getElementById('myQsList');
    section.style.display = 'flex';

    const card = document.createElement('div');
    card.className = 'my-q-card';
    const now = new Date();
    const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    card.innerHTML = `<div>${escHtml(text)}</div><div class="my-q-time">${time}</div>`;
    list.prepend(card);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
