<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Q&A 발표자 화면</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080810;
  --card-bg: #13131f;
  --card-border: rgba(255,255,255,0.07);
  --card-border-new: rgba(99,179,237,0.5);
  --text: #eeeef5;
  --text-muted: #6b6b8a;
  --text-faint: #2e2e44;
  --accent: #63b3ed;
  --font-kr: 'Noto Sans KR', sans-serif;
  --font-display: 'Bebas Neue', cursive;
}
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-kr);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 50%, rgba(99,179,237,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 70% at 85% 50%, rgba(159,122,234,0.06) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* 상단바 */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem;
  background: rgba(8,8,16,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--card-border);
  z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #48bb78;
  box-shadow: 0 0 8px rgba(72,187,120,0.8);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.live-label { font-size: 12px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #48bb78; }
#qCount { font-size: 13px; color: var(--text-muted); }
#qCount span { font-weight: 700; color: var(--accent); font-size: 16px; }

/* 메인 */
#main { position: relative; z-index: 1; height: 100vh; padding-top: 56px; display: flex; flex-direction: column; }
#empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
.empty-icon { font-size: 48px; opacity: 0.2; }
.empty-text { font-size: 18px; color: var(--text-faint); letter-spacing: -0.3px; }

/* 카드 컨테이너 */
#cardsWrap {
  flex: 1; overflow-y: auto;
  padding: 1.5rem 2rem 2rem;
  display: none; flex-direction: column; gap: 1rem;
  scrollbar-width: thin; scrollbar-color: var(--text-faint) transparent;
}
#cardsWrap::-webkit-scrollbar { width: 4px; }
#cardsWrap::-webkit-scrollbar-thumb { background: var(--text-faint); border-radius: 99px; }

/* 카드 */
.q-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 1.5rem 1.75rem;
  display: flex; flex-direction: column; gap: 1rem;
  animation: slideIn 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
  opacity: 0; transform: translateY(24px);
  min-width: 0;
}
.q-card.new-glow {
  border-color: var(--card-border-new);
  box-shadow: 0 0 24px rgba(99,179,237,0.12), inset 0 0 24px rgba(99,179,237,0.03);
}
@keyframes slideIn { to { opacity:1; transform:translateY(0); } }
.card-meta { display: flex; align-items: center; justify-content: space-between; }
.card-num { font-family: var(--font-display); font-size: 13px; letter-spacing: .1em; color: var(--text-faint); }
.card-time { font-size: 12px; color: var(--text-faint); }
.card-text {
  font-size: clamp(20px, 2.8vw, 32px);
  font-weight: 700;
  line-height: 1.55;
  letter-spacing: -0.5px;
  color: var(--text);
  word-break: keep-all;
  overflow-wrap: break-word;
  white-space: pre-wrap;
  min-width: 0;
  width: 100%;
}
.card-reactions { display: flex; gap: 10px; flex-wrap: wrap; }
.reaction-badge {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 18px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 99px;
  font-size: 22px; color: var(--text-muted);
  transition: background .2s, border-color .2s;
}
.reaction-badge.active {
  background: rgba(99,179,237,0.1);
  border-color: rgba(99,179,237,0.3);
  color: var(--accent);
}
.reaction-badge .r-count { font-size: 18px; font-weight: 700; min-width: 18px; }

/* 삭제 버튼 */
.btn-delete {
  align-self: flex-end;
  padding: 5px 14px;
  background: transparent;
  border: 1px solid rgba(255,80,80,0.25);
  border-radius: 8px;
  color: rgba(255,100,100,0.5);
  font-family: var(--font-kr);
  font-size: 12px;
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
}
.btn-delete:hover {
  background: rgba(255,80,80,0.1);
  border-color: rgba(255,80,80,0.5);
  color: rgba(255,100,100,0.9);
}


/* QR 패널 */
#qrPanel {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 50;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  background: rgba(8,8,16,0.75);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 14px;
}
#qrPanel img {
  width: 110px;
  height: 110px;
  border-radius: 8px;
  display: block;
}
#qrPanel .qr-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: center;
}

/* 플로팅 이모지 레이어 */
#floatLayer {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 200; overflow: hidden;
}
/* 헬륨풍선: 크게 나타나서 천천히 위로 떠오름 */
.float-emoji {
  position: absolute;
  font-size: 5rem;
  animation: heliumUp 3.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  will-change: transform, opacity;
  user-select: none;
  filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4));
}
@keyframes heliumUp {
  0%   { transform: translateY(0) scale(0.2) rotate(-8deg); opacity: 0; }
  10%  { transform: translateY(-20px) scale(1.25) rotate(4deg); opacity: 1; }
  30%  { transform: translateY(-80px) scale(1.1) rotate(-3deg); opacity: 1; }
  70%  { transform: translateY(-220px) scale(1.0) rotate(5deg); opacity: 0.85; }
  100% { transform: translateY(-420px) scale(0.85) rotate(-4deg); opacity: 0; }
}


</style>

    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  const EMOJIS = ['👍','👏','🔥','❤️','😮'];
  let db = null, qCount = 0;
  const prevReactions = {}; // key -> {emoji: count}

  // ── Firebase 값 직접 입력 ──────────────────────────────
  const FB_API_KEY     = 'AIzaSyAtm4SeBuP1oqA_R1iMifAx_wUDmwzRzvw';
  const FB_PROJECT_ID  = 'seminar-qa';
  const FB_DB_URL      = 'https://seminar-qa-default-rtdb.firebaseio.com';
  // ────────────────────────────────────────────────────

  (function autoConnect() {
    const config = {
      apiKey: FB_API_KEY,
      projectId: FB_PROJECT_ID,
      databaseURL: FB_DB_URL,
      authDomain: `${FB_PROJECT_ID}.firebaseapp.com`,
      storageBucket: `${FB_PROJECT_ID}.appspot.com`,
      messagingSenderId: '000000000000',
      appId: '1:000000000000:web:000000000000000000000000'
    };
    try {
      const app = initializeApp(config);
      db = getDatabase(app);
      listenQuestions();
    } catch(e) { alert('Firebase 연결 실패: ' + e.message); }
  })();

  function listenQuestions() {
    const qRef = ref(db, 'questions');

    onChildAdded(qRef, snap => {
      const data = snap.val();
      if (!data) return;
      qCount++;
      document.getElementById('qNum').textContent = qCount;
      prevReactions[snap.key] = { ...(data.reactions || {}) };
      addCard(snap.key, data, qCount);
      showEmpty(false);
    });

    onChildChanged(qRef, snap => {
      const data = snap.val();
      if (!data) return;
      const prev = prevReactions[snap.key] || {};
      const curr = data.reactions || {};

      // 이전 대비 증가한 이모지만 플로팅
      EMOJIS.forEach(e => {
        const prevCnt = prev[e] || 0;
        const currCnt = curr[e] || 0;
        const diff = currCnt - prevCnt;
        if (diff > 0) {
          for (let i = 0; i < Math.min(diff, 5); i++) {
            setTimeout(() => spawnFloat(e), i * 120);
          }
        }
      });

      prevReactions[snap.key] = { ...curr };
      updateCard(snap.key, data);
    });
  }

  function addCard(key, data, num) {
    const wrap = document.getElementById('cardsWrap');
    if (wrap.style.display !== 'flex') wrap.style.display = 'flex';
    const card = document.createElement('div');
    card.className = 'q-card new-glow';
    card.id = 'card-' + key;
    card.innerHTML = buildCardHTML(num, data);
    // 삭제 버튼에 실제 key 연결
    card.querySelector('.btn-delete').addEventListener('click', () => deleteQ(key, card));
    wrap.prepend(card);
    setTimeout(() => card.classList.remove('new-glow'), 3000);
  }

  async function deleteQ(key, cardEl) {
    if (!confirm('이 질문을 삭제할까요?')) return;
    try {
      await remove(ref(db, 'questions/' + key));
      cardEl.style.opacity = '0';
      cardEl.style.transform = 'translateX(40px)';
      cardEl.style.transition = 'opacity .3s, transform .3s';
      setTimeout(() => {
        cardEl.remove();
        qCount--;
        document.getElementById('qNum').textContent = qCount;
        if (document.getElementById('cardsWrap').children.length === 0) showEmpty(true);
      }, 300);
    } catch(e) { alert('삭제 실패: ' + e.message); }
  }

  function updateCard(key, data) {
    const card = document.getElementById('card-' + key);
    if (!card) return;
    const reactDiv = card.querySelector('.card-reactions');
    if (reactDiv) reactDiv.innerHTML = buildReactionHTML(data.reactions || {});
  }

  function buildCardHTML(num, data) {
    const t = new Date(data.createdAt || Date.now());
    const time = t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
    const safeText = escHtml(data.text || '');
    return `
      <div class="card-meta">
        <div class="card-num">Q${num}</div>
        <div class="card-time">${time}</div>
      </div>
      <div class="card-text">${safeText}</div>
      <div class="card-reactions">${buildReactionHTML(data.reactions || {})}</div>
      <button class="btn-delete" data-key="${num}">삭제</button>
    `;
  }

  function buildReactionHTML(reactions) {
    return EMOJIS.map(e => {
      const cnt = reactions[e] || 0;
      return `<div class="reaction-badge ${cnt > 0 ? 'active' : ''}">
        <span>${e}</span><span class="r-count">${cnt}</span>
      </div>`;
    }).join('');
  }

  function showEmpty(show) {
    document.getElementById('empty').style.display = show ? 'flex' : 'none';
    document.getElementById('cardsWrap').style.display = show ? 'none' : 'flex';
  }

  function spawnFloat(emoji) {
    const layer = document.getElementById('floatLayer');
    const el = document.createElement('div');
    el.className = 'float-emoji';
    el.textContent = emoji;
    // 화면 하단 곳곳에서 올라오도록
    el.style.left = (8 + Math.random() * 84) + '%';
    el.style.bottom = (40 + Math.random() * 60) + 'px';
    layer.appendChild(el);
    setTimeout(() => el.remove(), 3600);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
